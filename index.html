<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Not-Ready</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
      background: #111827;
      color: white;
    }

    /* Fake Login Screen */

    #loginScreen {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.7)),
        url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 1s ease-in-out;
      z-index: 100;
    }

    .login-box {
      width: 360px;
      padding: 40px;
      border-radius: 24px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-size: 42px;
      font-weight: 800;
    }

    .logo span {
      color: #60a5fa;
    }

    .subtitle {
      text-align: center;
      margin-top: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
    }

    input {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 15px;
    }

    input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #60a5fa;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.02);
      background: #3b82f6;
    }

    /* Hidden Website */

    #realWebsite {
      height: 100vh;
      width: 100%;
      background: linear-gradient(to bottom right, #020617, #111827);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #realWebsite h1 {
      font-size: 70px;
      margin-bottom: 10px;
    }

    #realWebsite p {
      font-size: 20px;
      color: rgba(255,255,255,0.7);
    }

    .hint {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 13px;
      z-index: 200;
    }

  </style>
</head>

<body>

  <div id="loginScreen">

    <div class="login-box">

      <div class="logo">
        <h1>Not<span>-Ready</span></h1>
        <div class="subtitle">
          Learning Platform
        </div>
      </div>

      <input id="username" type="text" placeholder="Username"/>
      <input id="password" type="password" placeholder="Password"/>

      <button onclick="fakeLogin()">Log In</button>

    </div>

  </div>

  <div id="realWebsite">
    <h1>NovaPlay</h1>
    <p>Your hidden game portal</p>
  </div>

  <div class="hint">
    ↑ ↓ ↑ ↓
  </div>

  <script>

    function fakeLogin() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;

      if (
        user === "NoGuardian" &&
        pass === "NoWayV6Dropped?"
      ) {
        alert("404Error");
      } else {
        alert("Invalid login");
      }
    }

    const sequence = [
      "ArrowUp",
      "ArrowDown",
      "ArrowUp",
      "ArrowDown"
    ];

    let entered = [];

    document.addEventListener("keydown", (e) => {

      entered.push(e.key);

      if (entered.length > sequence.length) {
        entered.shift();
      }

      if (
        JSON.stringify(entered) ===
        JSON.stringify(sequence)
      ) {

        document.getElementById("loginScreen")
          .style.transform = "translateY(-100%)";

      }

    });

  </script>

</body>
</html>
